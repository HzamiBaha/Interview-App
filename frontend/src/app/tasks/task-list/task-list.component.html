<mat-card>
    <mat-card-header>
        <mat-card-title>Task Management</mat-card-title>
        <button mat-button (click)="openCreateDialog()" style="margin-left: auto;">
            <mat-icon>add</mat-icon> Add Task
        </button>
        <button mat-button (click)="logout()">Logout</button>
    </mat-card-header>
    <mat-card-content>
        <div *ngIf="isLoading">Loading tasks...</div>
        <!-- here you need to create a list of tasks -->
         <!-- <div *ngIf="errorMessage" class="error-message">
            {{ errorMessage }}
            </div> -->
            <ng-container *ngIf="!isLoading">
                <mat-list *ngIf="tasks.length > 0">
                    <mat-list-item *ngFor="let task of tasks" (click)="openEditDialog(task)">
                        <h3 matLine>{{ task.title }}</h3>
                        <p matLine>Status: {{ task.completed ? 'Completed' : 'Pending' }}</p>
                        <button mat-button (click)="deleteTask(task.id!)">Delete</button>
                    </mat-list-item>
                </mat-list>
            </ng-container>
        </mat-card-content>
</mat-card>
